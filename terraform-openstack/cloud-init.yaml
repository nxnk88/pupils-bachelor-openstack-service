#cloud-config
package_update: true

packages:
  - ca-certificates
  - curl
  - docker.io

write_files:
  - path: /root/run-workstation-audit.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/bin/bash
      set -euo pipefail

      systemctl enable docker
      systemctl start docker

      docker pull ${docker_image}
      docker rm -f workstation-audit || true
      docker run -d \
        --name workstation-audit \
        --restart unless-stopped \
        -p 8000:8000 \
        ${docker_image}

runcmd:
  - /root/run-workstation-audit.sh
